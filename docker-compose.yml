x-backend-env: &backend-env
  ENVIRONMENT: development
  DATABASE_URL: postgresql+psycopg://pulse_app:pulse_app@db:5432/pulse
  ADMIN_DATABASE_URL: postgresql+psycopg://pulse:pulse@db:5432/pulse
  REDIS_URL: redis://redis:6379/0
  FRONTEND_ORIGIN: http://localhost:5173

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment: *backend-env
    depends_on:
      db: { condition: service_healthy }

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker -l info
    environment: *backend-env
    depends_on:
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  beat:
    build: ./backend
    command: celery -A app.celery_app.celery_app beat -l info
    environment: *backend-env
    depends_on:
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

volumes:
  pgdata:
